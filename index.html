<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:#111;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:black;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.container{
    padding:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.product{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

.cart-panel{
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:white;
    box-shadow:-5px 0 15px rgba(0,0,0,0.2);
    padding:20px;
    overflow-y:auto;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.remove{
    color:red;
    cursor:pointer;
}

.checkout{
    margin-top:15px;
    background:green;
}

.form-section{
    display:none;
    padding:40px;
    background:white;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}
.success{
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<header>
    <h2>🛒 TechStore</h2>
    <div>Panier (<span id="cart-count">0</span>)</div>
</header>

<div class="container" id="shop">

    <div class="product">
        <img src="https://via.placeholder.com/300x200">
        <h3>Casque Bluetooth</h3>
        <p>49€</p>
        <button onclick="addToCart('Casque Bluetooth',49)">Ajouter</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200">
        <h3>Montre Connectée</h3>
        <p>89€</p>
        <button onclick="addToCart('Montre Connectée',89)">Ajouter</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200">
        <h3>Clavier Gaming</h3>
        <p>69€</p>
        <button onclick="addToCart('Clavier Gaming',69)">Ajouter</button>
    </div>

</div>

<div class="cart-panel">
    <h3>Votre Panier</h3>
    <div id="cart-items"></div>
    <hr>
    <p>Total : <strong><span id="total">0</span>€</strong></p>
    <button class="checkout" onclick="showCheckout()">Commander</button>
</div>

<div class="form-section" id="checkout-section">
    <h2>Finaliser la commande</h2>

    <input type="text" id="name" placeholder="Nom complet" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="text" id="address" placeholder="Adresse de livraison" required>

    <h3>Récapitulatif :</h3>
    <div id="order-summary"></div>
    <p>Total : <strong><span id="final-total">0</span>€</strong></p>

    <button onclick="confirmOrder()">Confirmer la commande</button>

    <p class="success" id="success-message"></p>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
    localStorage.setItem("cart",JSON.stringify(cart));
}

function addToCart(name,price){
    cart.push({name,price});
    saveCart();
    updateCart();
}

function removeFromCart(index){
    cart.splice(index,1);
    saveCart();
    updateCart();
}

function updateCart(){
    let cartItems=document.getElementById("cart-items");
    let total=0;
    cartItems.innerHTML="";

    cart.forEach((item,index)=>{
        total+=item.price;
        cartItems.innerHTML+=`
        <div class="cart-item">
        ${item.name} - ${item.price}€
        <span class="remove" onclick="removeFromCart(${index})">❌</span>
        </div>`;
    });

    document.getElementById("total").innerText=total;
    document.getElementById("cart-count").innerText=cart.length;
}

function showCheckout(){
    if(cart.length===0){
        alert("Votre panier est vide");
        return;
    }

    document.getElementById("shop").style.display="none";
    document.querySelector(".cart-panel").style.display="none";
    document.getElementById("checkout-section").style.display="block";

    let summary="";
    let total=0;

    cart.forEach(item=>{
        summary+=`<p>${item.name} - ${item.price}€</p>`;
        total+=item.price;
    });

    document.getElementById("order-summary").innerHTML=summary;
    document.getElementById("final-total").innerText=total;
}

function confirmOrder(){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let address=document.getElementById("address").value;

    if(!name || !email || !address){
        alert("Veuillez remplir tous les champs");
        return;
    }

    document.getElementById("success-message").innerText=
    "Commande envoyée avec succès ! (simulation)";

    cart=[];
    saveCart();
}

updateCart();
</script>

</body>
</html>
